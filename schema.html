<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_TITLE}}</title>
</head>

<body>
    <header>
        <nav>
            <ul class="year-nav">
                {{YEAR_LINKS}}
            </ul>
            
            <ul class="month-nav">
                {{MONTH_LINKS}}
            </ul>
        </nav>
    </header>
    
    <main>
        <ol class="race-list">
            <!-- Repeat for each race that the athlete participated in -->
            <li>
                <article id="{{YEAR_OF_RACE}}_{{MONTH_OF_RACE}}">
                    <header>
                        <h2>{{MEET_NAME}}</h2>
                        <h3>{{GRADE}}</h3>
                        <p> {{DATE}}</p>
                    </header>
                    
                    <section class="race-results">
                        <p><strong>Time:</strong> {{TIME}}</p>
                        <p><strong>Place:</strong> {{PLACE}}</p>
                    </section>

                    <section class="team-results">
                        <p><strong>Team Place:</strong> {{TEAM_PLACE}}</p>
                        <p><strong>Team Score:</strong> {{TEAM_SCORE}}</p>
                    </section>

                    <!-- We want this to end up being a horizontal photo carousel -->
                    <section class="race-photos">
                        <img src="{{PHOTO_URL}}" alt="{{PHOTO_DESC}}">
                    </section>
                    
                    <p>
                        <a href="{{MEET_URL}}">
                            <strong>Meet ID:</strong> {{MEET ID}}>
                        </a>
                    </p>
                </article>
            </li>
        </ol>
    </main>

    <footer>
        <p>Gen'd from race spreadsheet</p>
    </footer>
</body>

</html>
